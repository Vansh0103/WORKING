<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mine Game</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  padding:20px;
  margin:0;
}

.card{
  max-width:420px;
  margin:auto;
  background:#1e293b;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
}

h2{margin-bottom:5px}

.muted{color:#94a3b8;font-size:14px}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:12px;
  font-size:16px;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
}

button:disabled{
  background:#475569;
  cursor:not-allowed;
}

#result{
  margin-top:18px;
  padding:12px;
  border-radius:12px;
  background:#0f172a;
  min-height:60px;
  font-size:14px;
}

.win{color:#22c55e}
.lose{color:#ef4444}

.loader{
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<div class="card">

<h2>💣 Mine Game</h2>
<p class="muted">Try your luck. Admin-controlled game.</p>

<p class="muted">
Min: ₹{{ min_bet }} | Max: ₹{{ max_bet }}
</p>

<input id="bet"
       type="number"
       step="0.01"
       min="{{ min_bet }}"
       max="{{ max_bet }}"
       value="{{ min_bet }}">

<button id="playBtn" onclick="playMine()">🎮 Play Now</button>

<div class="loader" id="loader">⏳ Playing...</div>

<div id="result"></div>

</div>

<script>
async function playMine(){
    const btn = document.getElementById('playBtn');
    const loader = document.getElementById('loader');
    const resultBox = document.getElementById('result');
    const bet = parseFloat(document.getElementById('bet').value);

    // Validation
    if(!bet || bet <= 0){
        resultBox.innerHTML = "<span class='lose'>Enter valid bet</span>";
        return;
    }

    btn.disabled = true;
    loader.style.display = "block";
    resultBox.innerHTML = "";

    try{
        const res = await fetch('/api/mine/play', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                uid: {{ user_id }},
                bet: bet
            })
        });

        const data = await res.json();

        if(data.ok){
            if(data.result === "win"){
                resultBox.innerHTML = `
                <div class="win">
                🎉 You Won!
                <br>Payout: ₹${data.payout}
                <br>Balance: ₹${data.balance}
                </div>`;
            } else {
                resultBox.innerHTML = `
                <div class="lose">
                💥 You Hit Mine!
                <br>Lost: ₹${bet}
                <br>Balance: ₹${data.balance}
                </div>`;
            }
        } else {
            resultBox.innerHTML = `<span class="lose">Error: ${data.error}</span>`;
        }

    } catch(err){
        resultBox.innerHTML = "<span class='lose'>Server error. Try again.</span>";
    }

    loader.style.display = "none";
    btn.disabled = false;
}
</script>

</body>
</html>
