<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mine Game</title><style>body{font-family:Arial,sans-serif;background:#111827;color:#fff;padding:20px}.card{max-width:420px;margin:auto;background:#1f2937;padding:20px;border-radius:16px}button,input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}button{background:#22c55e;color:#fff;font-weight:bold}.muted{color:#9ca3af}#result{margin-top:16px;white-space:pre-line}</style></head><body><div class="card"><h2>💣 Mine Game</h2><p class="muted">Admin-controlled mine game.</p><p>Min Bet: ₹{{ min_bet }} | Max Bet: ₹{{ max_bet }}</p><input id="bet" type="number" step="0.01" min="{{ min_bet }}" max="{{ max_bet }}" value="{{ min_bet }}"><button onclick="playMine()">Play</button><div id="result"></div></div><script>async function playMine(){const bet=document.getElementById('bet').value;const res=await fetch('/api/mine/play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:{{ user_id }},bet:bet})});const data=await res.json();document.getElementById('result').textContent=data.ok?`Result: ${data.result}
Payout: ₹${data.payout}
Balance: ₹${data.balance}`:`Error: ${data.error}`;}</script></body></html>")
