<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mine Game</title><style>body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:24px}.card{max-width:720px;margin:0 auto;background:#111827;border-radius:18px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,.3)}input,button{width:100%;padding:12px;border-radius:12px;border:0;margin-top:10px}button{background:#22c55e;color:#08130b;font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:18px 0}.cell{aspect-ratio:1;border-radius:12px;background:#1f2937;display:flex;align-items:center;justify-content:center;font-size:22px}.muted{color:#cbd5e1;font-size:14px}ul{padding-left:18px}</style></head><body><div class="card"><h1>💣 Mine Game</h1><p class="muted">Railway-ready template file. You can edit this UI later from <code>templates/mine.html</code>.</p><label>User ID</label><input id="uid" value="{{ uid }}" /><label>Bet Amount</label><input id="bet" type="number" min="1" step="0.01" value="5" /><button onclick="play()">Play Mines</button><div class="grid" id="grid"></div><div id="result" class="muted"></div><h3>Recent History</h3><ul id="history"></ul></div><script>function renderGrid(win){const grid=document.getElementById('grid');grid.innerHTML='';const mineIndex=Math.floor(Math.random()*25);for(let i=0;i<25;i++){const d=document.createElement('div');d.className='cell';d.textContent=win?(i===mineIndex?'💎':'✅'):(i===mineIndex?'💣':'⬜');grid.appendChild(d);}}async function play(){const user_id=document.getElementById('uid').value;const bet=parseFloat(document.getElementById('bet').value||'0');const res=await fetch('/api/mine/play',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id,bet})});const data=await res.json();document.getElementById('result').textContent=data.ok?`Outcome: ${data.won?'WIN':'LOSE'} | Reward ₹${data.reward} | Balance ₹${data.new_balance}`:(data.message||'Failed');if(data.ok){renderGrid(data.won);loadHistory();}}async function loadHistory(){const user_id=document.getElementById('uid').value;const res=await fetch(`/api/mine/history/${user_id}`);const data=await res.json();const el=document.getElementById('history');el.innerHTML='';(data.items||[]).forEach(item=>{const li=document.createElement('li');li.textContent=`${item.created_at} — ${item.outcome.toUpperCase()} — Bet ₹${item.bet_amount} Reward ₹${item.reward_amount}`;el.appendChild(li);});}loadHistory();</script></body></html>
